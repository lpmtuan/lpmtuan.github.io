<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercices de vocabulaire : Les Arts (B1+)</title>
    <style>
        :root {
            --primary: #2c3e50; /* Gris ardoise élégant */
            --ex1-color: #8e44ad; /* Violet (Musique) */
            --ex2-color: #d35400; /* Orange (Cinéma/Théâtre) */
            --ex3-color: #16a085; /* Vert (Photographie & Formats) */
            --success: #27ae60;
            --wrong: #c0392b;
            --bg-page: #f4f6f7;
            --bg-card: #ffffff;
            --text-main: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        /* --- EN-TÊTE ET BADGE --- */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .level-badge {
            display: inline-block;
            background-color: #f1c40f;
            color: #2c3e50;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .page-title {
            color: #fff;
            font-size: 2.8em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin: 0;
        }

        /* --- CARTES DES EXERCICES --- */
        .exercise-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 35px 40px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
            animation: fadeInUp 1s ease-out;
        }

        .exercise-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        /* Bordures dynamiques */
        #ex1 { border-top: 8px solid var(--ex1-color); }
        #ex2 { border-top: 8px solid var(--ex2-color); }
        #ex3 { border-top: 8px solid var(--ex3-color); }

        #ex1 h2 { color: var(--ex1-color); border-bottom: 2px dashed var(--ex1-color); }
        #ex2 h2 { color: var(--ex2-color); border-bottom: 2px dashed var(--ex2-color); }
        #ex3 h2 { color: var(--ex3-color); border-bottom: 2px dashed var(--ex3-color); }

        h2 {
            padding-bottom: 12px;
            margin-top: 0;
            font-size: 1.8em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-indicator {
            font-size: 0.95em;
            color: #7f8c8d;
            font-weight: 600;
            text-align: right;
            margin-bottom: 20px;
        }

        .sentence {
            font-size: 1.15em;
            line-height: 1.8;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #fdfefe;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background 0.3s;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        #ex1 .sentence { border-left: 4px solid var(--ex1-color); }
        #ex2 .sentence { border-left: 4px solid var(--ex2-color); }
        #ex3 .sentence { border-left: 4px solid var(--ex3-color); }

        .sentence:hover { background: #f4f6f7; }

        select {
            font-size: 0.95em;
            padding: 6px 12px;
            margin: 0 5px;
            border: 2px solid #bdc3c7;
            border-radius: 6px;
            background-color: #fff;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
            max-width: 100%;
        }

        select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(44, 62, 80, 0.3); }

        /* Classes de correction */
        select.correct { background-color: var(--success); color: white; border-color: var(--success); }
        select.wrong { background-color: var(--wrong); color: white; border-color: var(--wrong); }
        select.solution { background-color: var(--primary); color: white; border-color: var(--primary); }

        /* --- BARRE D'ACTIONS --- */
        .action-bar {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px dashed #bdc3c7;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .feedback-message {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            min-height: 35px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        button:active:not(:disabled) { transform: scale(0.95); }
        
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #ex1 .btn-check { background-color: var(--ex1-color); }
        #ex2 .btn-check { background-color: var(--ex2-color); }
        #ex3 .btn-check { background-color: var(--ex3-color); }

        .btn-check:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        .btn-reset { background-color: var(--wrong); display: none; }
        .btn-reset:hover { background-color: #a93226; }

        .btn-solution { background-color: var(--success); display: none; }
        .btn-solution:hover { background-color: #1e8449; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="level-badge">Niveau B1+</div>
        <h1 class="page-title">🎭 Les arts</h1>
    </div>

    <div class="exercise-card" id="ex1">
        <h2>🎵 Exercice 1 : L'univers de la musique</h2>
        <div class="progress-indicator" id="prog1">0 / 10 termes sélectionnés</div>
        <div id="sentences1"></div>

        <div class="action-area">
            <div class="feedback-message" id="feedback1"></div>
            <div class="btn-group">
                <button class="btn-check" id="btnCheck1" disabled onclick="checkAnswers(1)">Vérifier les réponses</button>
                <button class="btn-reset" id="btnReset1" onclick="resetExercise(1)">Réinitialiser l'exercice</button>
                <button class="btn-solution" id="btnSolution1" onclick="showSolution(1)">Voir le corrigé</button>
            </div>
        </div>
    </div>

    <div class="exercise-card" id="ex2">
        <h2>🎬 Exercice 2 : Les métiers du cinéma et du théâtre</h2>
        <div class="progress-indicator" id="prog2">0 / 10 termes sélectionnés</div>
        <div id="sentences2"></div>

        <div class="action-area">
            <div class="feedback-message" id="feedback2"></div>
            <div class="btn-group">
                <button class="btn-check" id="btnCheck2" disabled onclick="checkAnswers(2)">Vérifier les réponses</button>
                <button class="btn-reset" id="btnReset2" onclick="resetExercise(2)">Réinitialiser l'exercice</button>
                <button class="btn-solution" id="btnSolution2" onclick="showSolution(2)">Voir le corrigé</button>
            </div>
        </div>
    </div>

    <div class="exercise-card" id="ex3">
        <h2>📸 Exercice 3 : La photographie et les formats visuels</h2>
        <div class="progress-indicator" id="prog3">0 / 10 termes sélectionnés</div>
        <div id="sentences3"></div>

        <div class="action-area">
            <div class="feedback-message" id="feedback3"></div>
            <div class="btn-group">
                <button class="btn-check" id="btnCheck3" disabled onclick="checkAnswers(3)">Vérifier les réponses</button>
                <button class="btn-reset" id="btnReset3" onclick="resetExercise(3)">Réinitialiser l'exercice</button>
                <button class="btn-solution" id="btnSolution3" onclick="showSolution(3)">Voir le corrigé</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- DONNÉES EXERCICE 1 (Musique) ---
    const dataEx1 = [
        { text: "Lors du concert, {select} a captivé le public avec sa voix très puissante.", answer: "le chanteur" },
        { text: "Mozart est {select} autrichien mondialement connu pour ses symphonies.", answer: "un compositeur" },
        { text: "Ce soir, {select} de rock va jouer ses meilleurs morceaux sur la grande scène.", answer: "ce groupe" },
        { text: "Édith Piaf restera à jamais {select} inoubliable de la chanson « La Vie en rose ».", answer: "une interprète" },
        { text: "Je n'arrive pas à oublier {select} de cette chanson, elle reste sans cesse dans ma tête.", answer: "la mélodie" },
        { text: "Mon frère est {select} professionnel ; il joue du piano et de la guitare.", answer: "un musicien" },
        { text: "Pour me détendre le soir, j'aime écouter de {select} comme du Beethoven ou du Bach.", answer: "la musique classique" },
        { text: "Le chef a dirigé {select} symphonique avec beaucoup d'énergie.", answer: "l'orchestre" },
        { text: "Pour la cérémonie, ils ont engagé {select} à cordes avec deux violons, un alto et un violoncelle.", answer: "un quatuor" },
        { text: "Cette station de radio diffuse principalement de {select} française des années 80.", answer: "la variété" }
    ];
    const options1 = [
        "le chanteur", "un compositeur", "ce groupe", "une interprète", 
        "la mélodie", "un musicien", "la musique classique", "l'orchestre", 
        "un quatuor", "la variété"
    ];

    // --- DONNÉES EXERCICE 2 (Cinéma/Théâtre - Action/Métiers) ---
    const dataEx2 = [
        { text: "Brad Pitt est {select} très célèbre à Hollywood depuis plusieurs décennies.", answer: "un acteur" },
        { text: "Steven Spielberg est {select} de films incontournables comme Jurassic Park ou E.T.", answer: "le réalisateur" },
        { text: "La pièce de théâtre était moyenne, mais {select} était vraiment belle et originale.", answer: "la mise en scène" },
        { text: "J'adorerais {select} de méchant dans une grande production de science-fiction.", answer: "jouer un rôle" },
        { text: "L'équipe technique et les cascadeurs vont {select} d'action dans les rues de Paris.", answer: "tourner un film" },
        { text: "Pour bien {select} historique, il est essentiel de lire beaucoup de biographies.", answer: "interpréter un personnage" },
        { text: "Le casting est exceptionnel, {select} rassemble les plus grandes stars du moment.", answer: "la distribution" },
        { text: "Sur la scène du théâtre, {select} a oublié son texte mais a su improviser brillamment.", answer: "la comédienne" },
        { text: "Le cadreur a décidé d'utiliser un drone pour {select} la séquence de poursuite depuis le ciel.", answer: "filmer" },
        { text: "Le scénariste doit faire preuve de beaucoup d'imagination pour {select} captivante de A à Z.", answer: "inventer une histoire" }
    ];
    const options2 = [
        "un acteur", "le réalisateur", "la mise en scène", "jouer un rôle", 
        "tourner un film", "interpréter un personnage", "la distribution", 
        "la comédienne", "filmer", "inventer une histoire"
    ];

    // --- DONNÉES EXERCICE 3 (Photographie & Formats visuels) ---
    const dataEx3 = [
        { text: "Pendant mes vacances à l'étranger, je ne sors jamais sans mon {select} autour du cou.", answer: "appareil photo" },
        { text: "Pour immortaliser notre mariage, nous avons engagé {select} professionnel.", answer: "un photographe" },
        { text: "La Joconde (Mona Lisa) est {select} féminin le plus célèbre du musée du Louvre.", answer: "le portrait" },
        { text: "La magie de la photographie de rue, c'est de capturer {select} parfait, un moment éphémère.", answer: "l'instantané" },
        { text: "Les touristes adorent {select} la tour Eiffel lorsqu'elle scintille à la tombée de la nuit.", answer: "photographier" },
        { text: "Cette œuvre cinématographique dure plus de deux heures, c'est {select} très ambitieux.", answer: "un long-métrage" },
        { text: "Le mardi soir à la télévision, je regarde très souvent {select} sur la nature ou l'histoire.", answer: "un film documentaire" },
        { text: "Le jeune réalisateur a remporté un prix pour son {select} dramatique de quinze minutes seulement.", answer: "court-métrage" },
        { text: "Le magnifique château de Versailles a naturellement servi de {select} pour cette série historique.", answer: "décor" },
        { text: "Les spectateurs regardaient {select} géant avec attention pendant toute l'avant-première.", answer: "l'écran" }
    ];
    const options3 = [
        "appareil photo", "un photographe", "le portrait", "l'instantané", 
        "photographier", "un long-métrage", "un film documentaire", 
        "court-métrage", "décor", "l'écran"
    ];

    // Fonction de mélange aléatoire
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Construction du HTML
    function buildExercise(exNum, data, options) {
        const container = document.getElementById(`sentences${exNum}`);
        container.innerHTML = "";
        
        const shuffledOptions = shuffle([...options]);

        data.forEach((item, index) => {
            let selectHTML = `<select id="ex${exNum}-sel${index}" onchange="checkCompletion(${exNum})">
                                <option value="">-- Choisissez --</option>`;
            
            shuffledOptions.forEach(opt => {
                selectHTML += `<option value="${opt}">${opt}</option>`;
            });
            selectHTML += `</select>`;

            const div = document.createElement("div");
            div.className = "sentence";
            div.innerHTML = `<strong>${index + 1}.</strong> <span>${item.text.replace("{select}", selectHTML)}</span>`;
            container.appendChild(div);
        });
    }

    // Vérifie la complétion pour activer le bouton "Vérifier"
    window.checkCompletion = function(exNum) {
        const selects = document.querySelectorAll(`[id^='ex${exNum}-sel']`);
        let filledCount = 0;

        selects.forEach(select => {
            select.classList.remove('correct', 'wrong', 'solution'); 
            if (select.value !== "") filledCount++;
        });

        const prog = document.getElementById(`prog${exNum}`);
        prog.innerText = `${filledCount} / 10 termes sélectionnés`;

        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        
        if (filledCount === 10) {
            btnCheck.disabled = false;
            prog.style.color = "var(--success)";
        } else {
            btnCheck.disabled = true;
            prog.style.color = "#7f8c8d";
        }
    };

    // Validation du score
    window.checkAnswers = function(exNum) {
        const data = exNum === 1 ? dataEx1 : (exNum === 2 ? dataEx2 : dataEx3);
        let score = 0;

        data.forEach((item, index) => {
            const select = document.getElementById(`ex${exNum}-sel${index}`);
            select.disabled = true; // Verrouillage
            if (select.value === item.answer) {
                score++;
            }
        });

        const feedback = document.getElementById(`feedback${exNum}`);
        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        const btnReset = document.getElementById(`btnReset${exNum}`);
        const btnSolution = document.getElementById(`btnSolution${exNum}`);

        btnCheck.style.display = "none";

        // Score minimum exigé : 7/10
        if (score >= 7) {
            feedback.innerHTML = `🎉 Félicitations ! Votre score est de <span style="color:var(--success)">${score} / 10</span>`;
            feedback.style.color = "var(--success)";
            
            btnSolution.style.display = "block"; // Affiche le corrigé
            btnReset.style.display = "none";
        } else {
            feedback.innerHTML = `😕 Score insuffisant : <span style="color:var(--wrong)">${score} / 10</span>. Veuillez refaire l'exercice.`;
            feedback.style.color = "var(--wrong)";
            
            btnSolution.style.display = "none"; 
            btnReset.style.display = "block"; // Oblige à recommencer
        }
    };

    // Réinitialisation de l'exercice
    window.resetExercise = function(exNum) {
        const selects = document.querySelectorAll(`[id^='ex${exNum}-sel']`);
        selects.forEach(select => {
            select.value = "";
            select.disabled = false; // Déverrouille
            select.classList.remove('correct', 'wrong', 'solution');
        });

        document.getElementById(`feedback${exNum}`).innerText = "";
        
        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        btnCheck.style.display = "block";
        btnCheck.disabled = true; 
        
        document.getElementById(`btnReset${exNum}`).style.display = "none";
        document.getElementById(`btnSolution${exNum}`).style.display = "none";

        checkCompletion(exNum); 
    };

    // Affichage visuel du corrigé
    window.showSolution = function(exNum) {
        const data = exNum === 1 ? dataEx1 : (exNum === 2 ? dataEx2 : dataEx3);

        data.forEach((item, index) => {
            const select = document.getElementById(`ex${exNum}-sel${index}`);
            const userAnswer = select.value;
            
            select.value = item.answer; 
            
            if (userAnswer === item.answer) {
                select.classList.add('correct'); // En vert
            } else {
                select.classList.add('solution'); // En couleur primaire de l'interface
            }
        });

        document.getElementById(`feedback${exNum}`).innerHTML += ` <br><span style="color:var(--text-main); font-size: 0.85em; font-weight:normal;">(Le corrigé est affiché en couleurs dans les phrases)</span>`;
        document.getElementById(`btnSolution${exNum}`).style.display = "none";
    };

    // Initialisation
    window.onload = () => {
        buildExercise(1, dataEx1, options1);
        buildExercise(2, dataEx2, options2);
        buildExercise(3, dataEx3, options3);
    };

</script>
</body>
</html>
