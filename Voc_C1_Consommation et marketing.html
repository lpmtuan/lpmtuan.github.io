<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercice de voc. : Marketing et consommation</title>
    <style>
        :root {
            --primary: #2c3e50;
            --ex1-color: #0984e3; /* Bleu (Marketing) */
            --ex2-color: #d63031; /* Rouge (Militantisme/Consommation) */
            --success: #27ae60;
            --wrong: #d35400;
            --bg-page: #fdfbfb;
            --bg-card: #ffffff;
            --text-main: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            background-attachment: fixed;
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 950px;
            margin: 0 auto;
        }

        /* --- EN-TÊTE ET BADGE --- */
        .header-section {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.8s ease-out;
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); /* Couleurs vives fluo */
            color: #ffffff;
            padding: 8px 25px;
            border-radius: 30px;
            font-weight: 900;
            font-size: 1.15rem;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 4px 15px rgba(255, 8, 68, 0.4);
        }

        .page-title {
            color: var(--primary);
            font-size: 2.8em;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.5);
            margin: 0;
        }

        /* --- CARTES DES EXERCICES --- */
        .exercise-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 35px 40px;
            margin-bottom: 50px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            transition: transform 0.3s ease;
            animation: fadeInUp 1s ease-out;
        }

        .exercise-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
        }

        /* Bordures dynamiques */
        #ex1 { border-top: 8px solid var(--ex1-color); }
        #ex2 { border-top: 8px solid var(--ex2-color); }

        #ex1 h2 { color: var(--ex1-color); border-bottom: 2px dashed var(--ex1-color); }
        #ex2 h2 { color: var(--ex2-color); border-bottom: 2px dashed var(--ex2-color); }

        h2 {
            padding-bottom: 12px;
            margin-top: 0;
            font-size: 1.7em;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-indicator {
            font-size: 0.95em;
            color: #636e72;
            font-weight: 600;
            text-align: right;
            margin-bottom: 20px;
        }

        .sentence {
            font-size: 1.15em;
            line-height: 1.8;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: #fdfefe;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: background 0.3s;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        #ex1 .sentence { border-left: 4px solid var(--ex1-color); }
        #ex2 .sentence { border-left: 4px solid var(--ex2-color); }

        .sentence:hover { background: #f1f2f6; }

        select {
            font-size: 0.95em;
            padding: 6px 12px;
            margin: 0 5px;
            border: 2px solid #b2bec3;
            border-radius: 6px;
            background-color: #fff;
            color: var(--primary);
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            outline: none;
            max-width: 100%;
        }

        select:focus { border-color: var(--primary); box-shadow: 0 0 8px rgba(45, 52, 54, 0.3); }

        /* Classes de correction */
        select.correct { background-color: var(--success); color: white; border-color: var(--success); }
        select.wrong { background-color: var(--wrong); color: white; border-color: var(--wrong); }
        select.solution { background-color: var(--primary); color: white; border-color: var(--primary); }

        .action-area {
            margin-top: 35px;
            padding-top: 25px;
            border-top: 1px dashed #b2bec3;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .feedback-message {
            font-size: 1.3em;
            font-weight: bold;
            text-align: center;
            min-height: 35px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 14px 30px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: white;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        button:active:not(:disabled) { transform: scale(0.95); }
        
        button:disabled {
            background-color: #b2bec3;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        #ex1 .btn-check { background-color: var(--ex1-color); }
        #ex2 .btn-check { background-color: var(--ex2-color); }

        .btn-check:hover:not(:disabled) { filter: brightness(1.1); box-shadow: 0 6px 15px rgba(0,0,0,0.2); }

        .btn-reset { background-color: var(--wrong); display: none; }
        .btn-reset:hover { background-color: #a93226; }

        .btn-solution { background-color: var(--success); display: none; }
        .btn-solution:hover { background-color: #1e8449; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <div class="level-badge">B2/C1 CECRL</div>
        <h1 class="page-title">Voc. : Marketing et consommation</h1>
    </div>

    <div class="exercise-card" id="ex1">
        <h2>🛒 Exercice 1 : Les stratégies marketing et la publicité</h2>
        <div class="progress-indicator" id="prog1">0 / 10 termes sélectionnés</div>
        <div id="sentences1"></div>

        <div class="action-area">
            <div class="feedback-message" id="feedback1"></div>
            <div class="btn-group">
                <button class="btn-check" id="btnCheck1" disabled onclick="checkAnswers(1)">Vérifier les réponses</button>
                <button class="btn-reset" id="btnReset1" onclick="resetExercise(1)">Réinitialiser l'exercice</button>
                <button class="btn-solution" id="btnSolution1" onclick="showSolution(1)">Voir le corrigé</button>
            </div>
        </div>
    </div>

    <div class="exercise-card" id="ex2">
        <h2>✊ Exercice 2 : La société de consommation et ses détracteurs</h2>
        <div class="progress-indicator" id="prog2">0 / 10 termes sélectionnés</div>
        <div id="sentences2"></div>

        <div class="action-area">
            <div class="feedback-message" id="feedback2"></div>
            <div class="btn-group">
                <button class="btn-check" id="btnCheck2" disabled onclick="checkAnswers(2)">Vérifier les réponses</button>
                <button class="btn-reset" id="btnReset2" onclick="resetExercise(2)">Réinitialiser l'exercice</button>
                <button class="btn-solution" id="btnSolution2" onclick="showSolution(2)">Voir le corrigé</button>
            </div>
        </div>
    </div>

</div>

<script>
    // --- DONNÉES EXERCICE 1 (Lexique du marketing et de la publicité) ---
    const dataEx1 = [
        { text: "Pour lancer son nouveau parfum, la célèbre {select} a investi des millions d'euros.", answer: "marque" },
        { text: "L'entreprise a engagé une grande {select} pour concevoir sa nouvelle affiche.", answer: "agence de pub" },
        { text: "Sur Internet, il est difficile de lire un article sans être interrompu par un {select}.", answer: "bandeau publicitaire" },
        { text: "Cette association accuse la télévision de {select} les esprits des plus jeunes.", answer: "manipuler" },
        { text: "À la télévision, ce {select} passe en boucle entre deux émissions.", answer: "spot publicitaire" },
        { text: "Le but principal de ces annonces est souvent de {select} que l'on n'aurait jamais eus autrement.", answer: "fabriquer des désirs vains" },
        { text: "De plus en plus d'entreprises cherchent à {select} écologiques pour attirer les clients.", answer: "revendiquer des convictions" },
        { text: "Cette méthode de vente n'est finalement qu'un habile {select} pour nous faire payer plus cher.", answer: "tour de passe-passe" },
        { text: "Les écologistes dénoncent souvent cette {select} qui pousse à acheter toujours plus.", answer: "incitation à la surconsommation" },
        { text: "Le {select} cherche toujours à nous convaincre que nous avons absolument besoin de ce produit.", answer: "discours publicitaire" }
    ];
    const options1 = [
        "marque", 
        "agence de pub", 
        "bandeau publicitaire", 
        "manipuler", 
        "spot publicitaire", 
        "fabriquer des désirs vains", 
        "revendiquer des convictions", 
        "tour de passe-passe", 
        "incitation à la surconsommation", 
        "discours publicitaire"
    ];

    // --- DONNÉES EXERCICE 2 (Lexique de la société de consommation et du militantisme) ---
    const dataEx2 = [
        { text: "Pour écouler les invendus, les magasins organisent souvent {select} très attractives.", answer: "des soldes" },
        { text: "L'obsession pour la {select} économique infinie est souvent critiquée par les écologistes.", answer: "croissance" },
        { text: "L'omniprésence des panneaux lumineux dans les rues est considérée par certains comme une véritable {select}.", answer: "pollution visuelle" },
        { text: "Afin d'attirer de nouveaux clients, le supermarché propose une {select} exceptionnelle sur ces produits.", answer: "ristourne" },
        { text: "L'association de défense des consommateurs a porté plainte pour {select}.", answer: "publicité mensongère" },
        { text: "Acheter des vêtements pour ne les porter qu'une seule fois est un terrible {select}.", answer: "gaspillage" },
        { text: "Face aux affiches envahissantes, {select} organise des actions pour les recouvrir.", answer: "la brigade anti-pub" },
        { text: "Notre époque est souvent qualifiée de {select} car l'achat est devenu l'activité principale.", answer: "société d'hyperconsommation" },
        { text: "Les supermarchés cherchent à réduire les intermédiaires dans le {select} pour augmenter leurs marges.", answer: "circuit de distribution" },
        { text: "Le {select} repose sur l'accumulation du capital et la recherche constante du profit.", answer: "capitalisme" }
    ];
    const options2 = [
        "des soldes", 
        "croissance", 
        "pollution visuelle", 
        "ristourne", 
        "publicité mensongère", 
        "gaspillage", 
        "la brigade anti-pub", 
        "société d'hyperconsommation", 
        "circuit de distribution", 
        "capitalisme"
    ];

    // Fonction de mélange aléatoire
    function shuffle(array) {
        let currentIndex = array.length, randomIndex;
        while (currentIndex !== 0) {
            randomIndex = Math.floor(Math.random() * currentIndex);
            currentIndex--;
            [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
        }
        return array;
    }

    // Construction du HTML pour chaque exercice
    function buildExercise(exNum, data, options) {
        const container = document.getElementById(`sentences${exNum}`);
        container.innerHTML = "";
        
        const shuffledOptions = shuffle([...options]);

        data.forEach((item, index) => {
            let selectHTML = `<select id="ex${exNum}-sel${index}" onchange="checkCompletion(${exNum})">
                                <option value="">-- Choisissez --</option>`;
            
            shuffledOptions.forEach(opt => {
                selectHTML += `<option value="${opt}">${opt}</option>`;
            });
            selectHTML += `</select>`;

            const div = document.createElement("div");
            div.className = "sentence";
            div.innerHTML = `<strong>${index + 1}.</strong> <span>${item.text.replace("{select}", selectHTML)}</span>`;
            container.appendChild(div);
        });
    }

    // Vérifie la complétion
    window.checkCompletion = function(exNum) {
        const selects = document.querySelectorAll(`[id^='ex${exNum}-sel']`);
        let filledCount = 0;

        selects.forEach(select => {
            select.classList.remove('correct', 'wrong', 'solution'); 
            if (select.value !== "") filledCount++;
        });

        const prog = document.getElementById(`prog${exNum}`);
        prog.innerText = `${filledCount} / 10 termes sélectionnés`;

        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        
        if (filledCount === 10) {
            btnCheck.disabled = false;
            prog.style.color = "var(--success)";
        } else {
            btnCheck.disabled = true;
            prog.style.color = "#636e72";
        }
    };

    // Validation du score
    window.checkAnswers = function(exNum) {
        let data = exNum === 1 ? dataEx1 : dataEx2;
        let score = 0;

        data.forEach((item, index) => {
            const select = document.getElementById(`ex${exNum}-sel${index}`);
            select.disabled = true; // Verrouillage
            if (select.value === item.answer) {
                score++;
            }
        });

        const feedback = document.getElementById(`feedback${exNum}`);
        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        const btnReset = document.getElementById(`btnReset${exNum}`);
        const btnSolution = document.getElementById(`btnSolution${exNum}`);

        btnCheck.style.display = "none";

        // Score minimum exigé : 7/10
        if (score >= 7) {
            feedback.innerHTML = `🎉 Félicitations ! Votre score est de <span style="color:var(--success)">${score} / 10</span>`;
            feedback.style.color = "var(--success)";
            
            btnSolution.style.display = "block"; // Affiche le corrigé
            btnReset.style.display = "none";
        } else {
            feedback.innerHTML = `😕 Score insuffisant : <span style="color:var(--wrong)">${score} / 10</span>. Veuillez refaire l'exercice.`;
            feedback.style.color = "var(--wrong)";
            
            btnSolution.style.display = "none"; 
            btnReset.style.display = "block"; // Oblige à recommencer
        }
    };

    // Réinitialisation de l'exercice
    window.resetExercise = function(exNum) {
        const selects = document.querySelectorAll(`[id^='ex${exNum}-sel']`);
        selects.forEach(select => {
            select.value = "";
            select.disabled = false; // Déverrouille
            select.classList.remove('correct', 'wrong', 'solution');
        });

        document.getElementById(`feedback${exNum}`).innerText = "";
        
        const btnCheck = document.getElementById(`btnCheck${exNum}`);
        btnCheck.style.display = "block";
        btnCheck.disabled = true; 
        
        document.getElementById(`btnReset${exNum}`).style.display = "none";
        document.getElementById(`btnSolution${exNum}`).style.display = "none";

        checkCompletion(exNum); 
    };

    // Affichage visuel du corrigé
    window.showSolution = function(exNum) {
        let data = exNum === 1 ? dataEx1 : dataEx2;

        data.forEach((item, index) => {
            const select = document.getElementById(`ex${exNum}-sel${index}`);
            const userAnswer = select.value;
            
            select.value = item.answer; 
            
            if (userAnswer === item.answer) {
                select.classList.add('correct'); // En vert
            } else {
                select.classList.add('solution'); // En couleur primaire
            }
        });

        document.getElementById(`feedback${exNum}`).innerHTML += ` <br><span style="color:var(--text-main); font-size: 0.85em; font-weight:normal;">(Le corrigé est affiché en couleurs dans les phrases)</span>`;
        document.getElementById(`btnSolution${exNum}`).style.display = "none";
    };

    // Initialisation
    window.onload = () => {
        buildExercise(1, dataEx1, options1);
        buildExercise(2, dataEx2, options2);
    };

</script>
</body>
</html>
